name: Build OTDR Suite (Windows desktop)

on:
  workflow_dispatch:
  push:
    # MUST cover every path in launcher.ENGINE_FILES (+ the build harness) — a
    # push touching only an omitted path would ship no new Release, and once
    # auto-update is live the stale manifest would hash-mismatch the new raw
    # blobs and the fleet would reject the update.  test_update_manifest_integrity
    # asserts ENGINE_FILES ⊆ these globs so an added engine file can't slip out.
    paths:
      - "app.py"
      - "error_report.py"
      - "folder_intake.py"
      - "viewer/**"
      - "secretsauce/**"
      - "splicereport/**"
      - "components/**"
      - "desktop/**"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: write    # to publish / update the permanent Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v5        # node24-native (v4 ran on the now-forced-off node20)

      # Toolchain pins — see desktop/OTDRSuite.spec top-of-file for WHY.
      - name: Set up Python 3.11
        uses: actions/setup-python@v6    # node24-native
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Upgrade pip + wheel
        run: python -m pip install --upgrade pip wheel

      - name: Install desktop requirements
        run: pip install -r requirements-desktop.txt

      - name: Re-pin setuptools 65.5.1 LAST so it wins
        run: pip install --force-reinstall "setuptools==65.5.1"

      # ── TEST SUITE ─ runs ahead of the bundle step so a regression fails
      #    in seconds instead of after the multi-minute build.  Covers: hub
      #    pages render (AppTest), viewer engine SOR parse + contract,
      #    Secret Sauce runner (subprocess), and packaging/port contracts.
      #    PYTHONIOENCODING=utf-8 because windows-latest defaults to cp1252
      #    and any non-ASCII char (e.g. the → arrows) crashes the run.
      - name: Run test suite (pytest)
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest tests/ -v

      # Bake the Slack error-report webhook into the build from the repo SECRET
      # (never committed — the repo is public and Slack auto-revokes leaked
      # webhooks).  The spec bundles _webhook.cfg if present; absent → error
      # reporting ships OFF.  Written with no trailing newline so the launcher
      # reads it cleanly.  MUST run before the bundle build.
      - name: Bake error-report webhook (from secret)
        shell: pwsh
        env:
          SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
        run: |
          if ($env:SLACK_ERROR_WEBHOOK) {
            Set-Content -NoNewline -Path "_webhook.cfg" -Value $env:SLACK_ERROR_WEBHOOK
            Write-Host "wrote _webhook.cfg (error reporting ON)"
          } else {
            Write-Host "no SLACK_ERROR_WEBHOOK secret; error reporting OFF"
          }

      # ── VERSION STAMP ─ write version.json at the repo root so both specs
      #    bundle it (conditional datas entry — see OTDRSuite*.spec) and the app
      #    sidebar + error reports can name the build ("build 54 (2026-07-14)").
      #    Deliberately NOT gated to main so branch builds are identifiable too.
      #    Never committed: it's gitignored and the manifest-publish step
      #    `git add`s only the manifest pair.  MUST run before the bundle build.
      - name: Write version.json (build stamp)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $stamp = [ordered]@{
            build  = [int]$env:GITHUB_RUN_NUMBER
            date   = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
            commit = $env:GITHUB_SHA.Substring(0, 7)
          } | ConvertTo-Json -Compress
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) 'version.json'), $stamp)
          Write-Host "version.json: $stamp"

      # ── INJECT UPDATE-SIGNING PUBLIC KEY ─ turn auto-update ON for this build.
      #    Runs AFTER pytest (so the guardrail tests still see the fail-closed
      #    placeholder in source) and BEFORE PyInstaller (so the bundled exe
      #    carries the real key).  Derives the PUBLIC key from the SAME
      #    OTDR_UPDATE_SIGNING_KEY secret that signs the manifest, so the exe
      #    trusts exactly the key that signs — the two halves cannot drift.
      #    Secret unset (PRs / forks) → no-op → launcher stays fail-closed.
      - name: Inject update-signing public key
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          OTDR_UPDATE_SIGNING_KEY: ${{ secrets.OTDR_UPDATE_SIGNING_KEY }}
        run: python desktop/inject_update_pubkey.py

      - name: PyInstaller build
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist  }
          pyinstaller OTDRSuite.spec --noconfirm --clean

      # ── BOOT SELF-TEST ─ launch the exe, poll /_stcore/health, kill.
      #    A green build that won't launch fails HERE so a DOA build can
      #    never reach the Release page.
      - name: Boot self-test (launch exe, poll /_stcore/health)
        shell: pwsh
        # Pin the bundled engine for the DOA check: with the pubkey now injected
        # the exe would otherwise fetch the live manifest over the network at
        # boot, making this gate depend on GitHub + a prior release.  The
        # auto-update path is covered deterministically by the pytest crypto
        # tests; here we only care that the exe launches and serves health.
        env:
          OTDR_SUITE_NO_UPDATE: "1"
        run: |
          $exe = "dist\OTDRSuite\OTDRSuite.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "BOOT SELF-TEST FAILED — $exe missing after build."
            exit 1
          }
          $out = "boot_out.txt"; $err = "boot_err.txt"
          Remove-Item $out,$err -ErrorAction SilentlyContinue
          Write-Host "Launching $exe ..."
          $proc = Start-Process -FilePath $exe -PassThru `
                    -RedirectStandardOutput $out -RedirectStandardError $err
          $ok = $false
          for ($i = 0; $i -lt 45; $i++) {     # ~90 s
            Start-Sleep -Seconds 2
            if ($proc.HasExited) { Write-Host "Process exited early: $($proc.ExitCode)"; break }
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8510/_stcore/health" `
                     -UseBasicParsing -TimeoutSec 2
              if ($r.Content.Trim() -eq "ok") { $ok = $true; Write-Host ("Health=ok after ~{0}s" -f (($i+1)*2)); break }
            } catch { }
          }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          Get-Process -Name "OTDRSuite" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "----- boot_out.txt -----"; Get-Content $out -ErrorAction SilentlyContinue
          Write-Host "----- boot_err.txt -----"; Get-Content $err -ErrorAction SilentlyContinue
          $log = Join-Path $env:USERPROFILE ".otdrSuite\otdrsuite.log"
          if (Test-Path $log) { Write-Host "----- otdrsuite.log -----"; Get-Content $log -ErrorAction SilentlyContinue }
          if (-not $ok) {
            Write-Error "BOOT SELF-TEST FAILED — exe never served /_stcore/health=ok within 90s."
            exit 1
          }
          Write-Host "BOOT SELF-TEST PASSED."

      - name: Zip the dist folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\OTDRSuite\*" `
                           -DestinationPath "dist\OTDRSuite-Windows.zip" -Force

      # ── INSTALLER ─ per-user Windows installer that REMOVES the prior
      #    version on upgrade (see desktop/OTDRSuite.iss).  Built only after the
      #    boot self-test, so we never wrap a DOA app in an installer.
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "1.0.$($env:GITHUB_RUN_NUMBER)"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "iscc" }   # fall back to PATH
          & $iscc "/DAppVersion=$ver" OTDRSuite.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup compile failed."; exit 1 }
          if (-not (Test-Path "dist\OTDRSuite-Setup.exe")) {
            Write-Error "INSTALLER BUILD FAILED — dist\OTDRSuite-Setup.exe missing."
            exit 1
          }
          Write-Host "Built dist\OTDRSuite-Setup.exe (version $ver)"

      - name: Upload artifact
        uses: actions/upload-artifact@v6  # node24-native (v5 is still node20)
        with:
          name: OTDRSuite-Windows
          path: |
            desktop/dist/OTDRSuite-Setup.exe
            desktop/dist/OTDRSuite-Windows.zip
          retention-days: 14

      # ── SIGNED UPDATE MANIFEST ─ generate + sign the auto-update manifest
      #    AFTER the boot self-test (so a manifest only ever points at a build
      #    that actually launched) and BEFORE publishing it.  The launcher
      #    verifies update_manifest.json.sig with the Ed25519 PUBLIC key baked
      #    into launcher.py; this signs it with the PRIVATE half from the
      #    OTDR_UPDATE_SIGNING_KEY repo secret.  If that secret is absent the
      #    generator SKIPS gracefully (no files written) — the build still
      #    succeeds and auto-update stays unprovisioned (launcher fails closed).
      #    version = the run number (monotonic) so the launcher's anti-rollback
      #    only ever moves forward.
      - name: Generate + sign update manifest
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          OTDR_UPDATE_SIGNING_KEY: ${{ secrets.OTDR_UPDATE_SIGNING_KEY }}
        run: |
          python desktop/make_update_manifest.py `
            --version $env:GITHUB_RUN_NUMBER `
            --commit  $env:GITHUB_SHA `
            --out-dir .

      # Publish the signed manifest to where the launcher fetches it: committed
      # to the main branch (raw.githubusercontent.com/.../main/...).  Guarded to
      # main, and a no-op when the signing secret is unset (no manifest files
      # were written, so there is nothing to commit).
      - name: Publish signed manifest to main
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if (-not (Test-Path "update_manifest.json")) {
            Write-Host "No update_manifest.json (signing secret unset) — nothing to publish."
            exit 0
          }
          git config user.name  "otdr-suite-ci"
          git config user.email "ci@users.noreply.github.com"
          git add update_manifest.json update_manifest.json.sig
          git commit -m "ci: signed update manifest for run $env:GITHUB_RUN_NUMBER [skip ci]"
          if ($LASTEXITCODE -ne 0) { Write-Error "manifest commit failed"; exit 1 }
          # Fail LOUD (and BEFORE the Release upload, which is the next step) if the
          # push is rejected — e.g. a race with a concurrent main build.  pwsh does
          # not fail a step on a native command's non-zero exit on its own, so check
          # explicitly: otherwise we could ship a new Release .exe while main still
          # carries the previous manifest, stalling the auto-update fleet until the
          # next good build.
          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) { Write-Error "manifest push to main failed"; exit 1 }

      # Permanent download link — rewritten on every successful build.  Guarded
      # to main so a sandbox branch can build + boot-test + compile the installer
      # WITHOUT clobbering the live release; only main publishes.
      - name: Publish to permanent Release (windows-build)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "windows-build"
          gh release create $tag --title "OTDR Suite — Windows desktop build" `
             --notes "Permanent build link. Setup.exe is the installer (removes the prior version on upgrade); the .zip is the portable fallback. Rewritten by CI on every successful boot self-test." --latest 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Release $tag exists; uploading." }
          gh release upload $tag "dist\OTDRSuite-Setup.exe" "dist\OTDRSuite-Windows.zip" --clobber
